<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Talaria App Icons — Theme Gallery</title>
  <style>
    :root {
      --bg: #0a0610;
      --surface: rgba(255, 255, 255, 0.04);
      --fg: #f7f3ff;
      --muted: #a89fb8;
      --border: rgba(255, 255, 255, 0.10);
      --accent: #ff2bd6;
      --radius: 20px;
      --font-display: 'SF Pro Display', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      --font-body: 'SF Pro Text', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      --font-mono: 'SF Mono', ui-monospace, Menlo, monospace;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--fg); font-family: var(--font-body); line-height: 1.5; }
    body { padding: 2rem; background: radial-gradient(1200px 800px at 50% -10%, rgba(255, 43, 214, 0.10), transparent 60%), radial-gradient(ellipse at 50% 0%, #140a24 0%, #0a0610 50%, #050308 100%); }
    main { max-width: 1200px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 2.5rem; }
    h1 { font-family: var(--font-display); font-size: clamp(2.5rem, 6vw, 4rem); font-weight: 900; letter-spacing: -0.04em; margin: 0 0 0.5rem 0; color: var(--fg); text-shadow: 0 0 24px var(--accent), 0 0 60px rgba(255, 43, 214, 0.4); }
    .subtitle { font-family: var(--font-mono); font-size: 0.9rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; }
    .section-title { font-family: var(--font-display); font-size: 1.1rem; font-weight: 700; margin: 2.5rem 0 1rem 0; color: var(--fg); border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
    .icon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 1.25rem; }
    .icon-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; text-align: center; transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease; cursor: pointer; position: relative; }
    .icon-card:hover { transform: translateY(-4px); border-color: rgba(255, 43, 214, 0.4); box-shadow: 0 12px 40px rgba(255, 43, 214, 0.15); }
    .icon-card:focus-visible { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(255, 43, 214, 0.35), 0 12px 40px rgba(255, 43, 214, 0.15); transform: translateY(-2px); }
    .icon-card.active { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent), 0 12px 40px rgba(255, 43, 214, 0.25); }
    .icon-card.active:focus-visible { box-shadow: 0 0 0 3px rgba(255, 43, 214, 0.45), 0 0 0 2px var(--accent), 0 12px 40px rgba(255, 43, 214, 0.25); }
    .icon-canvas { width: 88px; height: 88px; margin: 0 auto 0.75rem; border-radius: 19px; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.45); }
    .icon-canvas svg { display: block; width: 100%; height: 100%; }
    .icon-name { font-family: var(--font-display); font-size: 0.85rem; font-weight: 700; margin: 0 0 0.25rem; }
    .icon-meta { font-family: var(--font-mono); font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
    .se-flag { position: absolute; top: 10px; right: 10px; font-family: var(--font-mono); font-size: 0.55rem; letter-spacing: 0.08em; color: #ffdc50; border: 1px solid rgba(255, 220, 80, 0.45); border-radius: 6px; padding: 2px 6px; background: rgba(255, 220, 80, 0.08); pointer-events: none; }
    .section-title.se { display: flex; align-items: baseline; gap: 0.6rem; border-bottom-color: rgba(255, 220, 80, 0.3); }
    .section-title.se .se-sub { font-family: var(--font-mono); font-size: 0.65rem; font-weight: 400; color: #ffdc50; text-transform: uppercase; letter-spacing: 0.12em; }
    .selected-preview { position: sticky; bottom: 1rem; background: rgba(10, 6, 16, 0.92); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; backdrop-filter: blur(12px); display: flex; gap: 1rem; align-items: center; max-width: 520px; margin: 2rem auto 0; box-shadow: 0 12px 40px rgba(0,0,0,0.5); }
    .selected-preview .icon-canvas { width: 72px; height: 72px; flex-shrink: 0; margin: 0; }
    .selected-info h3 { margin: 0 0 0.25rem; font-family: var(--font-display); font-size: 1rem; }
    .selected-info p { margin: 0 0 0.75rem; font-size: 0.8rem; color: var(--muted); }
    .export-note { margin: 2.5rem 0 4rem; text-align: center; font-family: var(--font-mono); font-size: 0.7rem; color: var(--muted); }

    .copy-btn { padding: 0.45rem 0.9rem; border: 1px solid var(--accent); background: rgba(255,43,214,0.12); color: var(--accent); border-radius: 8px; font-family: var(--font-mono); font-size: 0.7rem; cursor: pointer; transition: background 0.15s ease, transform 0.1s ease; }
    .copy-btn:hover { background: rgba(255,43,214,0.22); }
    .copy-btn:active { transform: scale(0.97); }
    .copy-btn:focus-visible { outline: none; box-shadow: 0 0 0 3px rgba(255, 43, 214, 0.35); }

    @media (max-width: 480px) {
      body { padding: 1.25rem; }
      .icon-grid { grid-template-columns: repeat(auto-fill, minmax(96px, 1fr)); gap: 0.875rem; }
      .icon-card { padding: 0.75rem; }
      .icon-canvas { width: 72px; height: 72px; }
      .icon-name { font-size: 0.75rem; }
      .selected-preview { flex-direction: column; text-align: center; gap: 0.75rem; }
    }
    </style>
</head>
<body>
  <main>
    <header>
      <h1>Talaria App Icons</h1>
      <div class="subtitle">19 standard + 5 special edition iOS app icon designs</div>
    </header>

    <section class="section-title">Choose an App Icon</section>
    <div class="icon-grid" id="iconGrid" role="radiogroup" aria-label="App icon choices"></div>

    <section class="section-title se">Special Edition <span class="se-sub">Limited series</span></section>
    <div class="icon-grid" id="seIconGrid" role="radiogroup" aria-label="Special edition app icon choices"></div>

    <div class="selected-preview" id="selectedPreview" style="display:none" role="status" aria-live="polite" aria-atomic="true">
      <div class="icon-canvas" id="previewCanvas" aria-hidden="true"></div>
      <div class="selected-info">
        <h3 id="previewName">Icon Name</h3>
        <p id="previewDesc">Description.</p>
        <button id="copySvgBtn" onclick="copySvg()" class="copy-btn">Copy SVG</button>
      </div>
    </div>

    <div class="export-note" id="exportNote">Each icon is a 1024×1024 SVG with theme colors. Export PNGs at 1024px for Xcode AppIcon.appiconset.</div>

      {

        name: 'Karaoke Supernova',

        se: true,

      }
    ];

    const grid = document.getElementById('iconGrid');
    const seGrid = document.getElementById('seIconGrid');
    const preview = document.getElementById('selectedPreview');
    const previewCanvas = document.getElementById('previewCanvas');
    const previewName = document.getElementById('previewName');
    const previewDesc = document.getElementById('previewDesc');


    let selectedIcon = null;
    function copySvg() {
      if (!selectedIcon) return;
      const svg = selectedIcon.svg;
      navigator.clipboard.writeText(svg).then(() => {
        const btn = document.getElementById('copySvgBtn');
        const old = btn.textContent;
        btn.textContent = 'Copied';
        setTimeout(() => btn.textContent = old, 1200);
      });
    }

    function render() {
      const cardHTML = (icon) => `
        <div class="icon-card" role="radio" aria-checked="false" tabindex="0" aria-label="${icon.name} — ${icon.desc}" data-id="${icon.id}" onclick="selectIcon('${icon.id}')" onkeydown="handleKey(event, '${icon.id}')">
          ${icon.se ? '<div class="se-flag">SE</div>' : ''}
          <div class="icon-canvas" style="background:${icon.bg}">${icon.svg}</div>
          <div class="icon-name">${icon.name}</div>
          <div class="icon-meta">${icon.id}</div>
        </div>
      `;
      grid.innerHTML = icons.filter(i => !i.se).map(cardHTML).join('');
      seGrid.innerHTML = icons.filter(i => i.se).map(cardHTML).join('');
    }

    function handleKey(e, id) {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        selectIcon(id);
      }
    }

    function selectIcon(id) {
      document.querySelectorAll('.icon-card').forEach(c => {
        c.classList.remove('active');
        c.setAttribute('aria-checked', 'false');
      });
      const card = document.querySelector(`.icon-card[data-id="${id}"]`);
      if (card) {
        card.classList.add('active');
        card.setAttribute('aria-checked', 'true');
      }
      const icon = icons.find(i => i.id === id);
      previewCanvas.style.background = icon.bg;
      previewCanvas.innerHTML = icon.svg;
      previewName.textContent = icon.name;
      previewDesc.textContent = icon.desc;
      selectedIcon = icon;
      preview.style.display = 'flex';
      localStorage.setItem('talaria-selected-icon', id);
    }

    render();
    const saved = localStorage.getItem('talaria-selected-icon');
    if (saved) selectIcon(saved);
  </script>
