name: Talaria
options:
  # Public-safe defaults. Replace locally if you regenerate the project
  # for a private deployment with your own signing/bundle identifiers.
  bundleIdPrefix: org.aethyrion
  deploymentTarget:
    iOS: "27.0"
  xcodeVersion: "27.0"
  defaultConfig: Debug
  generateEmptyDirectories: true
  groupSortPosition: top
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.2"
    SWIFT_STRICT_CONCURRENCY: complete
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    INFOPLIST_KEY_UILaunchScreen_Generation: true
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    ENABLE_PREVIEWS: true

packages:
  WebRTC:
    url: https://github.com/stasel/WebRTC.git
    version: 130.0.0

targets:
  Talaria:
    type: application
    platform: iOS
    entitlements:
      path: Talaria/Talaria.entitlements
      properties:
        # Declared here so `xcodegen generate` stops stripping it from the
        # entitlements file (OPEN_ITEMS #44/#48 trap). Dev/sandbox value —
        # switch to production for TestFlight/Release (#8).
        aps-environment: development
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
        com.apple.developer.healthkit.background-delivery: true
        # #28: WeatherTool in the device tool belt (Apple Weather, 500k
        # calls/mo free tier). Declared HERE (not just in the .entitlements
        # file) because of the #44/#48 xcodegen strip trap.
        com.apple.developer.weatherkit: true
        # #19: CarPlay voice-based conversational category (iOS 26.4+).
        # DISABLED pending Apple's discretionary capability grant. Leaving the
        # key ACTIVE breaks signed device builds — the dev provisioning profile
        # cannot carry an ungranted restricted entitlement, so Xcode/device
        # signing fails at "GatherProvisioningInputs". Re-enable the line below
        # to run the CarPlay Simulator scene locally (#74), and permanently once
        # Apple approves the capability for team DNL25ZFSD2 / org.aethyrion.talaria27.
        # Kept HERE (not only in the .entitlements file) for the #44/#48 strip trap.
        # com.apple.developer.carplay-voice-based-conversation: true
        com.apple.security.application-groups:
          - group.org.aethyrion.talaria
    sources:
      - path: Talaria
        excludes:
          - "**/.DS_Store"
      # Theme palette tables shared with the widget extension (single source
      # of truth for theme/accent color values).
      - path: Shared
    resources:
      - path: Talaria/Resources
        optional: true
    dependencies:
      - package: WebRTC
      - target: TalariaWidgets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.aethyrion.talaria27
        PRODUCT_NAME: "Talaria 27"
        # Keep the Swift module importable as `Talaria` (tests use
        # `@testable import Talaria`); PRODUCT_NAME alone would rename the
        # module to Talaria_27.
        PRODUCT_MODULE_NAME: Talaria
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: "DNL25ZFSD2"
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_KEY_CFBundleDisplayName: Talaria27
    scheme:
      testTargets:
        - TalariaTests
    info:
      path: Talaria/Resources/Info.plist
      properties:
        CFBundleDisplayName: Talaria27
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        NSLocationWhenInUseUsageDescription: "Hermes uses your location to provide contextual recommendations and nearby suggestions."
        NSHealthShareUsageDescription: "Hermes reads your health data to offer personalized wellness insights."
        NSHealthUpdateUsageDescription: "Hermes does not write health data, but this permission is required by the system."
        NSCameraUsageDescription: "Hermes uses the camera to capture photos and documents for analysis."
        NSPhotoLibraryUsageDescription: "Hermes accesses your photo library to help organize and search your photos."
        NSMicrophoneUsageDescription: "Hermes uses the microphone for voice conversations in Talk Mode."
        NSLocationAlwaysAndWhenInUseUsageDescription: "Hermes uses your location in the background to provide contextual awareness and proactive suggestions."
        NSMotionUsageDescription: "Hermes uses motion data to understand your current activity for contextual awareness."
        NSSpeechRecognitionUsageDescription: "Hermes uses speech recognition for voice commands and local transcription."
        # #28 device tool belt: contextual permission prompts fire on first
        # tool use (calendar/reminder/contact questions in chat).
        NSCalendarsFullAccessUsageDescription: "Hermes reads your calendar to answer questions about your schedule, and only creates events you approve."
        NSRemindersFullAccessUsageDescription: "Hermes reads your reminders to answer questions about your to-dos, and only creates reminders you approve."
        NSContactsUsageDescription: "Hermes looks up contacts you ask about — for example, to find a phone number or email address."
        # #16: AlarmKit executor (/alarm). User authorization only — no App
        # Store entitlement involved.
        NSAlarmKitUsageDescription: "Hermes schedules alarms and timers you ask for — each one is confirmed in-app before it's set."
        NSSupportsLiveActivities: true
        NSSupportsLiveActivitiesFrequentUpdates: true
        UIAppFonts:
          - ChakraPetch-Medium.ttf
          - ChakraPetch-SemiBold.ttf
          - ChakraPetch-Bold.ttf
          - SpaceGrotesk-Regular.ttf
          - SpaceGrotesk-Medium.ttf
          - SpaceGrotesk-Bold.ttf
          - JetBrainsMono-Regular.ttf
          - JetBrainsMono-Medium.ttf
          - JetBrainsMono-Bold.ttf
        # Alternate home-screen app icons (issue #25). The primary icon stays in
        # the asset catalog; alternates are loose flat PNGs in
        # Talaria/Resources/AppIcons/ (Icon-<Name>@2x/@3x.png). Adding an icon =
        # a new key here + its PNGs + an AppIconCatalog entry, then
        # `xcodegen generate`. Keys are the names passed to setAlternateIconName.
        CFBundleIcons:
          CFBundlePrimaryIcon:
            CFBundleIconName: AppIcon
          CFBundleAlternateIcons:
            DeepField:
              CFBundleIconFiles:
                - Icon-DeepField
              UIPrerenderedIcon: false
            SolarForge:
              CFBundleIconFiles:
                - Icon-SolarForge
              UIPrerenderedIcon: false
            Terminal:
              CFBundleIconFiles:
                - Icon-Terminal
              UIPrerenderedIcon: false
            PaperTape:
              CFBundleIconFiles:
                - Icon-PaperTape
              UIPrerenderedIcon: false
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        UIBackgroundModes:
          - fetch
          - processing
          - location
          - remote-notification
          - audio
        # #14 native background wake. `fetch` above powers BGAppRefreshTask;
        # the wildcard covers per-send BGContinuedProcessingTask identifiers.
        # Keep in sync with BackgroundTaskService.swift.
        BGTaskSchedulerPermittedIdentifiers:
          - org.aethyrion.talaria27.refresh
          - org.aethyrion.talaria27.continued.*
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
          UISceneConfigurations:
            CPTemplateApplicationSceneSessionRoleApplication:
              - UISceneClassName: CPTemplateApplicationScene
                UISceneConfigurationName: CarPlay
                UISceneDelegateClassName: "$(PRODUCT_MODULE_NAME).CarPlaySceneDelegate"

  TalariaWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: TalariaWidgets
      # Shared theme palette tables (also compiled into the app target).
      - path: Shared
    entitlements:
      path: TalariaWidgets/TalariaWidgets.entitlements
      properties:
        # HealthKit on the WIDGET target so the health tiles query HealthKit
        # directly in the extension (#15). Declared here — not just in the
        # .entitlements file — because the #44/#48 xcodegen strip trap applies
        # to this target too.
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
        com.apple.security.application-groups:
          - group.org.aethyrion.talaria
    info:
      path: TalariaWidgets/Info.plist
      properties:
        CFBundleDisplayName: Talaria27 Widgets
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
        # Widget-side HealthKit reads (#15). Authorization is only ever
        # requested in the main app; the string is here for completeness.
        NSHealthShareUsageDescription: Talaria reads steps, calories, sleep, and heart rate to keep the Health widget tiles current.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.aethyrion.talaria27.Widgets
        PRODUCT_NAME: TalariaWidgets
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.2"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "DNL25ZFSD2"
        TARGETED_DEVICE_FAMILY: "1,2"
    scheme: {}

  TalariaTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TalariaTests
    dependencies:
      - target: Talaria
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.aethyrion.talaria27.tests
        TEST_TARGET_NAME: Talaria
        # PRODUCT_NAME on the app target is "Talaria 27", so XcodeGen's
        # auto-derived TEST_HOST (Talaria.app/Talaria) is wrong.
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Talaria 27.app/Talaria 27"
        BUNDLE_LOADER: "$(TEST_HOST)"
        GENERATE_INFOPLIST_FILE: true

  TalariaUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: TalariaUITests
    dependencies:
      - target: Talaria
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.aethyrion.talaria27.uitests
        TEST_TARGET_NAME: Talaria
        GENERATE_INFOPLIST_FILE: true
